<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F9FAF5;
        }
        .sage-gradient {
            background: linear-gradient(145deg, #436831 0%, #2C4F1B 100%);
        }
        .ambient-shadow {
            box-shadow: 0 12px 40px rgba(67, 73, 62, 0.06);
        }
        .ghost-border {
            border: 1px solid rgba(195, 201, 186, 0.2);
        }
    </style>

<body class="bg-background min-h-screen flex flex-col items-center justify-center p-6 antialiased">
<!-- Login Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Branding Identity (Top of Card) -->
<div class="mb-12 text-center">
<h1 class="text-2xl font-bold tracking-tight text-primary font-headline">The Living Atelier</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-wide uppercase opacity-70">Aesthetic Gateway</p>
</div>
<!-- Central Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 md:p-12 ambient-shadow border border-surface-container-low">
<!-- Header Section -->
<div class="text-center mb-10">
<h2 class="text-3xl font-bold text-on-surface tracking-tight mb-2">Selamat Datang</h2>
<p class="text-on-surface-variant text-sm">Masuk untuk mengelola ruang atelier Anda.</p>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-6 rounded-full border border-outline-variant hover:bg-surface-container-low transition-colors duration-200 mb-8">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google multicolor logo icon on a transparent background for social authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdEYmHIirSf8Asg5oWMzHA1Tk6KPu6i9JcptPxWemi534CnKyeTNxDUiHOgDoP7Im8qLbR3lWiNX8exykdNXyiynhBTUm_NpwepDv7LiOP6upcdFFjvWv1quVz5rnwpPQmzbzmFr7LGkStTgSQabOE7cQSXySW7LtWcctIjAHhRzX_wZ31EfcalJB1QPLmPuuI8A3zXDXrjbX_tfyHH4e2CwRf4_kFB1SNCi9I8OeS1-STznHoENucx4lyXpC7L3JBpTstZAiYQp8"/>
<span class="text-on-surface font-semibold text-sm">Masuk dengan Google</span>
</button>
<!-- Divider -->
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-outline-variant opacity-30"></div>
<span class="flex-shrink mx-4 text-xs font-label uppercase tracking-widest text-on-surface-variant opacity-60">Atau gunakan email</span>
<div class="flex-grow border-t border-outline-variant opacity-30"></div>
</div>
<!-- Manual Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant ml-4">Email</label>
<input class="w-full px-6 py-4 rounded-lg bg-surface-container-lowest ghost-border focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-on-surface transition-all duration-200" placeholder="nama@email.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2 relative">
<div class="flex justify-between items-end mb-1">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant ml-4">Password</label>
<a class="text-[0.75rem] font-semibold text-primary hover:underline decoration-2 underline-offset-4 mr-4" href="#">Lupa Password?</a>
</div>
<div class="relative">
<input class="w-full px-6 py-4 rounded-lg bg-surface-container-lowest ghost-border focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-on-surface transition-all duration-200" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-4">
<input class="w-5 h-5 rounded-[0.5rem] border-outline-variant text-primary focus:ring-primary-container bg-surface-container-lowest" id="remember" type="checkbox"/>
<label class="ml-3 text-sm text-on-surface-variant font-medium" for="remember">Ingat Saya</label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full py-4 rounded-full sage-gradient text-white font-bold text-lg ambient-shadow hover:opacity-90 transition-all duration-200 active:scale-[0.98]" type="submit">
                        Masuk ke Dashboard
                    </button>
</div>
</form>
<!-- Bottom Action -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Belum punya akun? 
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Daftar Sekarang</a>
</p>
</div>
</div>
<!-- Optional Decorative Background Elements (Organic Feel) -->
<div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-secondary-container/10 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none -z-10"></div>
</main>
<!-- Footer Meta -->
<footer class="mt-12">
<div class="flex gap-8 items-center">
<span class="text-[0.6875rem] uppercase tracking-[0.1em] font-medium text-on-surface-variant opacity-50">© 2024 The Living Atelier</span>
<div class="flex gap-6">
<a class="text-[0.6875rem] uppercase tracking-[0.1em] font-medium text-on-surface-variant opacity-50 hover:opacity-100 transition-opacity" href="#">Privacy</a>
<a class="text-[0.6875rem] uppercase tracking-[0.1em] font-medium text-on-surface-variant opacity-50 hover:opacity-100 transition-opacity" href="#">Terms</a>
</div>
</div>
</footer>
</body></html>
